<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>おんぷキャッチ</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: linear-gradient(160deg, #FFF7E8 0%, #FFEBD6 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 48px;
  }
  .title { font-size: 30px; font-weight: 800; color: #6C5CE7; letter-spacing: 1px; }
  .subtitle { font-size: 14px; color: #8B86B0; margin-top: 4px; }
  .notes { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 20px 0; max-width: 360px; }
  .note-btn {
    padding: 8px 14px; border-radius: 999px; border: none; font-weight: 700; font-size: 15px;
    cursor: pointer; background: #FFFFFF; color: #6C5CE7; box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    font-family: inherit;
  }
  .note-btn.active { background: #6C5CE7; color: #fff; box-shadow: 0 4px 12px rgba(108,92,231,0.35); }
  .guide-btn {
    margin-top: 4px; padding: 8px 18px; border-radius: 999px; border: 2px solid #6C5CE7;
    background: #fff; color: #6C5CE7; font-weight: 700; font-size: 13px; cursor: pointer;
    font-family: inherit; transition: all 0.15s ease;
  }
  .guide-btn:active { transform: scale(0.96); background: #F0EDFF; }
  .octave-row { display: flex; gap: 8px; margin-top: 8px; }
  .octave-btn {
    padding: 6px 14px; border-radius: 999px; border: 1.5px solid #D8D3EE;
    background: #fff; color: #A29BC7; font-weight: 700; font-size: 12px; cursor: pointer;
    font-family: inherit; transition: all 0.15s ease;
  }
  .octave-btn.active { background: #E8E4F5; color: #6C5CE7; border-color: #6C5CE7; }
  .character {
    width: 200px; height: 200px; border-radius: 50%; background: #E8E4F5;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(108,92,231,0.25); border: 6px solid #fff;
    transition: background 0.25s ease, transform 0.15s ease;
  }
  .meter-wrap { width: 280px; margin-top: 24px; }
  .meter-bar {
    position: relative; height: 16px; border-radius: 999px;
    background: linear-gradient(90deg, #4E9EDE 0%, #7FC4E8 44%, #4ADE80 49%, #4ADE80 51%, #FFC15E 56%, #FF9F4E 100%);
  }
  .meter-dot { position: absolute; top: -6px; width: 6px; height: 28px; border-radius: 3px; background: #2D2A4A; transition: left 0.08s linear; }
  .meter-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: #B0AAC9; }
  .stats { margin-top: 22px; display: flex; gap: 12px; }
  .stat-card { background: #fff; border-radius: 16px; padding: 10px 18px; text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.06); }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 11px; color: #B0AAC9; }
  .start-btn {
    margin-top: 30px; padding: 16px 42px; border-radius: 999px; border: none; font-size: 18px; font-weight: 800;
    color: #fff; background: linear-gradient(135deg,#6C5CE7,#8B7CF6); box-shadow: 0 8px 20px rgba(108,92,231,0.4);
    cursor: pointer; font-family: inherit;
  }
  .start-btn.stop { background: linear-gradient(135deg,#FF7A7A,#FF5C5C); box-shadow: 0 8px 20px rgba(255,122,122,0.4); }
  .hint { margin-top: 16px; font-size: 13px; color: #B0AAC9; text-align: center; max-width: 260px; }
  .error { margin-top: 16px; font-size: 13px; color: #FF5C5C; text-align: center; max-width: 280px; }
  @keyframes sway { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .sway { animation: sway 2.4s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="title">おんぷキャッチ</div>
  <div class="subtitle">目でみて、声のズレをつかもう</div>

  <div class="notes" id="notes"></div>
  <div class="octave-row">
    <button class="octave-btn" id="octLowBtn">低いオクターブ</button>
    <button class="octave-btn active" id="octHighBtn">高いオクターブ</button>
  </div>
  <button class="guide-btn" id="guideBtn">🔊 お手本の音を聞く</button>

  <div id="charWrap"><div class="character" id="character">
    <svg width="120" height="120" viewBox="0 0 120 120" id="face">
      <circle cx="40" cy="45" r="6" fill="#2D2A4A" id="eyeL"/>
      <circle cx="80" cy="45" r="6" fill="#2D2A4A" id="eyeR"/>
      <path d="M 40 75 Q 60 80 80 75" stroke="#2D2A4A" stroke-width="5" fill="none" stroke-linecap="round" id="mouth"/>
    </svg>
  </div></div>

  <div class="meter-wrap">
    <div class="meter-bar"><div class="meter-dot" id="dot" style="left:50%; opacity:0.15;"></div></div>
    <div class="meter-labels"><span>ひくい</span><span>ぴったり</span><span>たかい</span></div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" style="color:#4ADE80" id="streakNum">0.0<span style="font-size:13px;font-weight:400">びょう</span></div><div class="stat-label">れんぞく</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#6C5CE7" id="bestNum">0.0<span style="font-size:13px;font-weight:400">びょう</span></div><div class="stat-label">ベスト</div></div>
  </div>

  <button class="start-btn" id="startBtn">🎤 はじめる</button>
  <div class="hint" id="hint">音名を選んで「はじめる」を押すと、その音に向かって声を出す練習ができます</div>
  <div class="error" id="error" style="display:none;"></div>

<script>
window.onerror = function(msg, url, line, col, error) {
  const el = document.getElementById('error');
  if (el) {
    el.style.display = 'block';
    el.textContent = 'スクリプトエラー: ' + msg + ' (行:' + line + ')';
  }
  return false;
};

const NOTES = [
  { label: "ド", semitone: 0 },
  { label: "レ", semitone: 2 },
  { label: "ミ", semitone: 4 },
  { label: "ファ", semitone: 5 },
  { label: "ソ", semitone: 7 },
  { label: "ラ", semitone: 9 },
  { label: "シ", semitone: 11 },
  { label: "ド↑", semitone: 12 },
];
const C4 = 261.6256;
const freqOf = s => C4 * Math.pow(2, s/12);

let targetIdx = 0;
let listening = false;
let audioCtx, analyser, stream, buf, rafId;
let streakStart = null, best = 0;
let smoothedCents = 0;
let guideCtx;
let pendingJumpCount = 0;
let octaveShift = 0; // デフォルトは高いオクターブ
const METER_RANGE = 400; // メーターの表示範囲(セント)

const notesEl = document.getElementById('notes');
NOTES.forEach((n, i) => {
  const b = document.createElement('button');
  b.className = 'note-btn' + (i===0 ? ' active' : '');
  b.textContent = n.label;
  b.onclick = () => {
    targetIdx = i;
    smoothedCents = 0;
    document.querySelectorAll('.note-btn').forEach(el => el.classList.remove('active'));
    b.classList.add('active');
  };
  notesEl.appendChild(b);
});

function autoCorrelate(buf, sampleRate) {
  const SIZE = buf.length;
  let rms = 0;
  for (let i=0;i<SIZE;i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/SIZE);
  if (rms < 0.01) return -1;
  let r1=0, r2=SIZE-1;
  const thres = 0.2;
  for (let i=0;i<SIZE/2;i++){ if (Math.abs(buf[i])<thres){ r1=i; break; } }
  for (let i=1;i<SIZE/2;i++){ if (Math.abs(buf[SIZE-i])<thres){ r2=SIZE-i; break; } }
  const trimmed = buf.slice(r1,r2);
  const newSize = trimmed.length;
  const c = new Array(newSize).fill(0);
  for (let i=0;i<newSize;i++){ for (let j=0;j<newSize-i;j++){ c[i]+=trimmed[j]*trimmed[j+i]; } }
  let d=0; while (c[d]>c[d+1]) d++;
  let maxval=-1, maxpos=-1;
  for (let i=d;i<newSize;i++){ if (c[i]>maxval){ maxval=c[i]; maxpos=i; } }
  let T0 = maxpos;
  if (T0<=0) return -1;
  const x1=c[T0-1]||0, x2=c[T0]||0, x3=c[T0+1]||0;
  const a=(x1+x3-2*x2)/2, b=(x3-x1)/2;
  if (a) T0 = T0 - b/(2*a);
  return sampleRate/T0;
}

function updateFace(cents, active) {
  const character = document.getElementById('character');
  const eyeL = document.getElementById('eyeL');
  const eyeR = document.getElementById('eyeR');
  const mouth = document.getElementById('mouth');
  const inTune = active && Math.abs(cents) <= 15;
  const close = active && Math.abs(cents) <= 120;
  let bg = '#E8E4F5';
  if (active) {
    if (inTune) bg = '#4ADE80';
    else if (cents > 0) bg = close ? '#FFC15E' : '#FF9F4E'; // 高い→オレンジ系
    else bg = close ? '#7FC4E8' : '#4E9EDE'; // 低い→青系
  }
  character.style.background = bg;
  character.style.transform = inTune ? 'scale(1.06)' : 'scale(1)';
  const clamped = Math.max(-50, Math.min(50, cents||0));
  const eyeY = active ? 45 + clamped/8 : 45;
  eyeL.setAttribute('cy', eyeY);
  eyeR.setAttribute('cy', eyeY);
  let d;
  if (!active) d = "M 40 75 Q 60 80 80 75";
  else if (inTune) d = "M 35 72 Q 60 95 85 72";
  else if (close) d = "M 38 78 Q 60 82 82 78";
  else d = cents > 0 ? "M 38 82 Q 60 68 82 82" : "M 38 72 Q 60 86 82 72";
  mouth.setAttribute('d', d);
}

function tick() {
  if (!analyser) return;
  analyser.getFloatTimeDomainData(buf);
  const freq = autoCorrelate(buf, audioCtx.sampleRate);
  const targetFreq = freqOf(NOTES[targetIdx].semitone + octaveShift);
  const dot = document.getElementById('dot');
  const streakNum = document.getElementById('streakNum');
  const bestNum = document.getElementById('bestNum');

  if (freq !== -1 && freq > 60 && freq < 1200) {
    const rawCents = 1200 * Math.log2(freq/targetFreq);
    const jumpSize = Math.abs(rawCents - smoothedCents);

    if (jumpSize > 250 && pendingJumpCount < 3) {
      // 急な飛び(オクターブ誤検出やノイズの可能性)は、3フレーム連続で
      // 同じ方向に出るまで採用しない
      pendingJumpCount++;
    } else {
      pendingJumpCount = 0;
      // 動きが速すぎないように、直前の値との平滑化(スムージング)をかける
      smoothedCents += (rawCents - smoothedCents) * 0.09;
    }
    const cents = smoothedCents;
    updateFace(cents, true);
    const barPos = Math.max(-METER_RANGE, Math.min(METER_RANGE, cents));
    dot.style.left = (((barPos+METER_RANGE)/(METER_RANGE*2))*100) + '%';
    dot.style.opacity = 1;
    if (Math.abs(cents) <= 15) {
      if (!streakStart) streakStart = performance.now();
      const secs = (performance.now()-streakStart)/1000;
      streakNum.innerHTML = secs.toFixed(1) + '<span style="font-size:13px;font-weight:400">びょう</span>';
      if (secs > best) { best = secs; bestNum.innerHTML = best.toFixed(1) + '<span style="font-size:13px;font-weight:400">びょう</span>'; }
    } else {
      streakStart = null;
      streakNum.innerHTML = '0.0<span style="font-size:13px;font-weight:400">びょう</span>';
    }
  } else {
    updateFace(0, false);
    dot.style.opacity = 0.15;
    streakStart = null;
    streakNum.innerHTML = '0.0<span style="font-size:13px;font-weight:400">びょう</span>';
  }
  rafId = requestAnimationFrame(tick);
}

const startBtn = document.getElementById('startBtn');
const errorEl = document.getElementById('error');
const hintEl = document.getElementById('hint');
const guideBtn = document.getElementById('guideBtn');
const octLowBtn = document.getElementById('octLowBtn');
const octHighBtn = document.getElementById('octHighBtn');

octLowBtn.onclick = () => {
  octaveShift = -12;
  smoothedCents = 0;
  octLowBtn.classList.add('active');
  octHighBtn.classList.remove('active');
};
octHighBtn.onclick = () => {
  octaveShift = 0;
  smoothedCents = 0;
  octHighBtn.classList.add('active');
  octLowBtn.classList.remove('active');
};

// お手本の音(サイン波)を鳴らす
function playGuideTone() {
  if (!guideCtx) guideCtx = new (window.AudioContext || window.webkitAudioContext)();
  const freq = freqOf(NOTES[targetIdx].semitone + octaveShift);
  const osc = guideCtx.createOscillator();
  const gain = guideCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  const now = guideCtx.currentTime;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.28, now + 0.06);
  gain.gain.setValueAtTime(0.28, now + 0.9);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.1);
  osc.connect(gain).connect(guideCtx.destination);
  osc.start(now);
  osc.stop(now + 1.15);
}
guideBtn.onclick = playGuideTone;

startBtn.onclick = async () => {
  if (listening) {
    listening = false;
    startBtn.textContent = '🎤 はじめる';
    startBtn.classList.remove('stop');
    if (rafId) cancelAnimationFrame(rafId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
    updateFace(0, false);
    document.getElementById('dot').style.opacity = 0.15;
    return;
  }
  errorEl.style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    buf = new Float32Array(analyser.fftSize);
    source.connect(analyser);
    listening = true;
    startBtn.textContent = '■ とめる';
    startBtn.classList.add('stop');
    hintEl.style.display = 'none';
    rafId = requestAnimationFrame(tick);
  } catch (e) {
    errorEl.textContent = 'マイクを使えませんでした。ブラウザの設定でマイクへのアクセスを許可してください。(' + e.message + ')';
    errorEl.style.display = 'block';
  }
};
</script>
</body>
</html>
